name: hct-deepfake
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0
  - torchvision>=0.15
  - pytorch-cuda=11.8
  - cmake          # required to build dlib
  - pip:
      - timm>=0.9.2
      - face_recognition>=1.3.0
      - dlib>=19.24.0
      - opencv-python>=4.7.0
      - numpy>=1.24.0
      - pandas>=2.0.0
      - scikit-learn>=1.3.0
      - matplotlib>=3.7.0
      - seaborn>=0.12.0
      - tqdm>=4.65.0
      - PyYAML>=6.0
      - googledrivedownloader>=0.4
